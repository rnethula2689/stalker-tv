name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Stamp unique build number + version file (so About shows the real build & updates work)
        run: |
          sed -i 's/\r$//' app/build.gradle.kts   # tolerate CRLF so the $-anchored stamp below matches
          sed -i "s/versionCode = 1$/versionCode = ${{ github.run_number }}/" app/build.gradle.kts
          sed -i "s/versionName = \"1.0\"/versionName = \"1.0.${{ github.run_number }}\"/" app/build.gradle.kts
          echo "{\"versionCode\": ${{ github.run_number }}, \"versionName\": \"1.0.${{ github.run_number }}\"}" > latest_version.json
          grep -E "versionCode|versionName" app/build.gradle.kts
          cat latest_version.json

      - name: Build debug APK
        run: gradle assembleDebug -PtmdbKey="${{ secrets.TMDB_KEY }}" -PomdbKey="${{ secrets.OMDB_KEY }}" --no-daemon --stacktrace

      # (No per-run upload-artifact step: the APK is published to the apk-latest release below, which
      # is what downloads / share-links / the in-app updater use. Skipping the artifact keeps Actions
      # storage from piling up with redundant copies.)

      - name: Publish APK to a release (for easy Fire TV download)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: Latest APK
          files: |
            app/build/outputs/apk/debug/*.apk
            latest_version.json
