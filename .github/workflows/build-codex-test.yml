name: Build Codex Test APK

on:
  push:
    branches: [ 'codex/**' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Stamp Codex test build number + version file
        run: |
          sed -i 's/\r$//' app/build.gradle.kts
          sed -i "s/versionCode = 1$/versionCode = ${{ github.run_number }}/" app/build.gradle.kts
          sed -i "s/versionName = \"1.0\"/versionName = \"1.0.${{ github.run_number }}\"/" app/build.gradle.kts
          echo "{\"versionCode\": ${{ github.run_number }}, \"versionName\": \"1.0.${{ github.run_number }}-codex\"}" > latest_version.json
          grep -E "versionCode|versionName" app/build.gradle.kts
          cat latest_version.json

      - name: Build side-by-side Codex test APK
        run: gradle assembleCodexTest -PtmdbKey="${{ secrets.TMDB_KEY }}" -PomdbKey="${{ secrets.OMDB_KEY }}" --no-daemon --stacktrace

      - name: Rename APK for stable download URL
        run: cp app/build/outputs/apk/codexTest/*.apk app/build/outputs/apk/codexTest/vibe-tv-codex-test.apk

      - name: Publish Codex test APK to a separate release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-codex-test
          name: Codex Test APK
          files: |
            app/build/outputs/apk/codexTest/vibe-tv-codex-test.apk
            latest_version.json
